# Dependency monitoring for Sentry-USB-Rusty.
#
# Weekly grouped PRs for minor + patch updates to keep noise down.
# Version updates target main-dev (release flow: main-dev -> main).
# Security advisories fire immediately as separate ungrouped PRs and
# always target the default branch (Dependabot ignores target-branch
# for security updates) — retarget those to main-dev before merging.

version: 2

updates:
  - package-ecosystem: "cargo"
    directory: "/"
    target-branch: "main-dev"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Edmonton"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "rust"
    commit-message:
      prefix: "deps(cargo)"
      include: "scope"
    groups:
      cargo-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "npm"
    directory: "/web"
    target-branch: "main-dev"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Edmonton"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "web"
    commit-message:
      prefix: "deps(web)"
      include: "scope"
    groups:
      web-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "main-dev"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Edmonton"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "deps(ci)"
      include: "scope"
    groups:
      actions-minor-and-patch:
        update-types:
          - "minor"
          - "patch"
