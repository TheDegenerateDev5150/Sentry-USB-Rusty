name: disk-reader

# The desktop sidecar (sentryusb-disk-reader) is host-architecture, not a
# Pi binary, so it gets its own workflow: golden-image integration tests on
# Linux (the only place we can mkfs.xfs), plus compile checks for the mac
# and Windows targets it will ship on.

on:
  push:
    branches: [main, main-dev, 'feat/disk-reader']
    paths:
      - 'crates/disk_reader/**'
      - '.github/workflows/disk-reader.yml'
  pull_request:
    branches: [main, main-dev]
    paths:
      - 'crates/disk_reader/**'
      - '.github/workflows/disk-reader.yml'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  golden-image:
    name: Golden-image integration test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: Swatinem/rust-cache@v2
        with:
          key: disk-reader-linux

      - name: Build
        run: cargo build --release -p disk_reader

      - name: Build golden SSD image
        run: |
          sudo apt-get -qq update && sudo apt-get -qq install -y xfsprogs dosfstools parted
          sudo bash crates/disk_reader/tests/make_golden_image.sh golden.img
          sudo chmod a+r golden.img golden.img.manifest

      - name: Probe
        run: ./target/release/sentryusb-disk-reader probe golden.img

      - name: Verify merged tree is byte-exact vs kernel mounts
        run: |
          set -euo pipefail
          BIN=./target/release/sentryusb-disk-reader
          fail=0
          while read -r want path; do
            got=$($BIN cat golden.img "$path" | sha256sum | cut -d' ' -f1)
            if [ "$got" != "$want" ]; then
              echo "MISMATCH $path: want $want got $got"
              fail=1
            else
              echo "ok $path"
            fi
          done < golden.img.manifest
          count=$($BIN ls golden.img TeslaCam | wc -l)
          echo "TeslaCam top-level entries: $count"
          exit $fail

      - name: Verify newest-wins merge semantics
        run: |
          set -euo pipefail
          BIN=./target/release/sentryusb-disk-reader
          # event.json was rewritten in epoch 2; merged view must show the
          # newest version (with "camera":"3").
          $BIN cat golden.img "TeslaCam/SavedClips/2026-07-01_10-00-00/event.json" | grep -q '"camera":"3"'
          # Clip C exists only in the live image + tocless snap-000003.
          $BIN ls golden.img "TeslaCam/RecentClips" | grep -q "2026-07-03_08-00-00-front.mp4"
          echo "merge semantics ok"

  cross-check:
    name: cargo check (${{ matrix.target }})
    strategy:
      matrix:
        include:
          - { runs_on: macos-14, target: aarch64-apple-darwin }
          - { runs_on: windows-latest, target: x86_64-pc-windows-msvc }
    runs-on: ${{ matrix.runs_on }}
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
        with:
          key: disk-reader-${{ matrix.target }}
      - name: Check
        run: cargo check -p disk_reader --target ${{ matrix.target }}
